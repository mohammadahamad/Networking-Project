<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessions Networking — Advisory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg-main: #CAFADD; /* Vert très clair / Menthe pour le fond général */
    --primary: #06845E; /* Vert vif */
    --primary-dark: #004323; /* Vert profond */
    --secondary: #45598E; /* Bleu de la charte */
    --card-bg: #ffffff; /* Blanc */
    --text-main: #004323; /* Lisibilité max sur fond clair */
    --text-muted: #45598E; 
    --border: rgba(69, 89, 142, 0.15);
    --radius: 12px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-main);
    color: var(--text-main);
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.5;
  }

  /* HEADER */
  header {
  padding: 4rem 4rem 3rem;
  background: url('/soiree_networking.png') center/cover no-repeat;
  color: var(--card-bg);
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  border-bottom-left-radius: 32px;
  border-bottom-right-radius: 32px;
  box-shadow: 0 10px 30px rgba(0, 67, 35, 0.15);
  position: relative;
  height: 40vh;
}

  .logo {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--bg-main);
  }

  .header-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 3rem;
  }

  h1 {
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--card-bg);
  }

  h1 em {
    font-style: italic;
    color: var(--bg-main);
    font-weight: 500;
  }

  .header-desc {
    max-width: 420px;
    font-family: 'Roboto', sans-serif;
    font-size: 15px;
    line-height: 1.8;
    color: rgba(255, 255, 255, 0.85);
    background: rgba(255, 255, 255, 0.07);
    padding: 1.5rem;
    border-radius: var(--radius);
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  /* MAIN */
  main {
    padding: 4rem;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }

  .card {
    background: var(--card-bg);
    padding: 2.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(0, 67, 35, 0.06);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
    position: relative;
    border: 1px solid rgba(69, 89, 142, 0.08);
    overflow: hidden;
  }

  .card:hover { 
    transform: translateY(-6px);
    box-shadow: 0 12px 30px rgba(0, 67, 35, 0.12);
  }

  .card-tag {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--primary);
    font-weight: 700;
    margin-bottom: 0.25rem;
  }

  .card-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary-dark);
    line-height: 1.3;
    padding-right: 2rem;
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: rgba(202, 250, 221, 0.25);
    padding: 1rem;
    border-radius: var(--radius-sm);
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--primary-dark);
    font-weight: 500;
  }

  .meta-row svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    stroke: var(--primary);
  }

  .divider {
    height: 1px;
    background: var(--border);
  }

  .attendees-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
  }

  .attendees-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
    flex: 1;
  }

  .attendee {
    font-size: 13px;
    color: var(--primary-dark);
    padding: 8px 12px;
    background: rgba(69, 89, 142, 0.04);
    border-radius: var(--radius-sm);
    border-left: 3px solid var(--border);
    transition: all 0.2s;
    font-weight: 500;
  }

  .attendee.me {
    border-left-color: var(--primary);
    background: var(--bg-main);
    color: var(--primary-dark);
    font-weight: 600;
  }

  .empty-msg {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
    opacity: 0.8;
  }

  .count-badge {
    font-size: 12px;
    color: var(--text-muted);
  }

  .count-badge span {
    font-weight: 700;
    color: var(--primary);
  }

  /* BUTTON */
  .btn-register {
    border: 2px solid var(--primary);
    background: transparent;
    color: var(--primary);
    padding: 13px 18px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    border-radius: var(--radius-sm);
    transition: all 0.2s ease;
    margin-top: auto;
  }

  .btn-register:hover {
    background: var(--primary);
    color: var(--card-bg);
    box-shadow: 0 4px 12px rgba(6, 132, 94, 0.2);
  }

  .btn-register.registered {
    border-color: var(--primary-dark);
    background: var(--primary-dark);
    color: var(--card-bg);
  }

  .btn-register.registered:hover {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--card-bg);
  }

  .btn-register:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    box-shadow: none !important;
  }

  /* OVERLAY */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 43, 23, 0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .overlay.active { display: flex; }

  .modal {
    background: var(--card-bg);
    width: 460px;
    max-width: 92vw;
    padding: 3rem 2.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    position: relative;
    border-radius: var(--radius);
    box-shadow: 0 20px 50px rgba(0, 43, 23, 0.3);
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-close {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    background: rgba(69, 89, 142, 0.08);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    color: var(--primary-dark);
    font-size: 22px;
    line-height: 1;
    padding: 4px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover { background: rgba(6, 132, 94, 0.15); color: var(--primary); }

  .modal-tag {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--primary);
    font-weight: 700;
    margin-bottom: 0.25rem;
  }

  .modal-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--primary-dark);
    line-height: 1.3;
  }

  .modal-session-info {
    background: var(--bg-main);
    padding: 1.25rem;
    font-size: 14px;
    color: var(--primary-dark);
    line-height: 1.6;
    border-radius: var(--radius-sm);
    border-left: 4px solid var(--primary);
  }

  .modal-session-info strong {
    color: var(--primary-dark);
    font-weight: 700;
    display: block;
    margin-bottom: 4px;
    font-size: 15px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 700;
  }

  .field input {
    border: 2px solid rgba(69, 89, 142, 0.15);
    background: #fafbfc;
    padding: 12px 14px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--primary-dark);
    outline: none;
    transition: all 0.2s;
    border-radius: var(--radius-sm);
    width: 100%;
  }

  .field input:focus { 
    border-color: var(--primary); 
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(6, 132, 94, 0.1);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .error-msg {
    font-size: 13px;
    font-weight: 500;
    color: #B03A2E;
    background: #FDECEA;
    padding: 10px 14px;
    border-left: 4px solid #B03A2E;
    border-radius: var(--radius-sm);
    display: none;
  }

  .switch-notice {
    font-size: 13px;
    font-weight: 500;
    color: var(--primary-dark);
    background: var(--bg-main);
    padding: 10px 14px;
    border-left: 4px solid var(--primary);
    border-radius: var(--radius-sm);
    line-height: 1.5;
    display: none;
  }

  .confirm-identity {
    background: var(--bg-main);
    padding: 1.25rem;
    font-size: 15px;
    color: var(--primary-dark);
    border-radius: var(--radius-sm);
    font-weight: 500;
    display: none;
    text-align: center;
  }

  .confirm-identity strong { color: var(--primary); font-weight: 700; }

  .modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 0.5rem;
  }

  .btn-confirm {
    flex: 1;
    background: var(--primary);
    color: var(--card-bg);
    border: none;
    padding: 14px 24px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(6, 132, 94, 0.2);
  }

  .btn-confirm:hover { background: var(--primary-dark); box-shadow: 0 4px 12px rgba(0, 67, 35, 0.2); }
  .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

  .btn-cancel-modal {
    background: transparent;
    color: var(--text-muted);
    border: 2px solid rgba(69, 89, 142, 0.2);
    padding: 14px 20px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.2s;
  }

  .btn-cancel-modal:hover { border-color: var(--primary-dark); color: var(--primary-dark); }

  /* CALENDAR BUTTONS */
  .calendar-section {
    background: var(--bg-main);
    border-radius: var(--radius-sm);
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .calendar-section-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 700;
    margin-bottom: 2px;
  }

  .calendar-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn-cal {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 14px;
    border-radius: var(--radius-sm);
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    text-decoration: none;
  }

  .btn-cal-outlook {
    background: #0078D4;
    color: white;
    border-color: #0078D4;
  }
  .btn-cal-outlook:hover { background: #005fa3; border-color: #005fa3; }

  .btn-cal-google {
    background: white;
    color: #444;
    border-color: rgba(69,89,142,0.2);
  }
  .btn-cal-google:hover { border-color: var(--primary); color: var(--primary-dark); }

  .btn-cal-apple {
    background: #1C1C1E;
    color: white;
    border-color: #1C1C1E;
  }
  .btn-cal-apple:hover { background: #333; border-color: #333; }

  .btn-cal svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--primary-dark);
    color: var(--card-bg);
    padding: 14px 28px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.03em;
    border-radius: 40px;
    opacity: 0;
    box-shadow: 0 10px 25px rgba(0, 43, 23, 0.25);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 999;
    white-space: nowrap;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* LOADING */
  .loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg-main);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 0.4s ease;
  }

  .loading-screen.hide { opacity: 0; pointer-events: none; }

  .loader-text {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.05em;
    animation: pulse 1.5s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(0.98); }
    50% { opacity: 1; transform: scale(1); }
  }

  /* RESPONSIVE */
  @media (max-width: 1200px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 900px) {
    header { padding: 3rem 2rem 2.5rem; border-radius: 0 0 20px 20px; }
    main { padding: 2rem; }
    .header-content { flex-direction: column; align-items: flex-start; gap: 1.5rem; }
    .header-desc { text-align: left; max-width: 100%; }
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; gap: 16px; }
    .modal { padding: 2rem 1.5rem; }
    .form-row { grid-template-columns: 1fr; gap: 12px; }
  }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <p class="loader-text">Chargement…</p>
</div>

<header>
  <div class="logo"></div>
  </header>

<main>
  <div class="grid" id="grid"></div>
</main>

<!-- MODAL -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <button class="modal-close" id="btnClose" aria-label="Fermer">×</button>
    <div>
      <p class="modal-tag" id="modalTag">Session</p>
      <h2 class="modal-title" id="modalTitle">S'inscrire</h2>
    </div>
    <div class="modal-session-info" id="modalInfo">
      <strong id="modalInfoTitle"></strong>
      <span id="modalInfoDetails"></span>
    </div>
    <div id="confirmIdentity" class="confirm-identity">
      Vous vous inscrivez en tant que <strong id="confirmName"></strong>.
    </div>
    <div id="switchNotice" class="switch-notice"></div>
    <div id="formFields">
      <div class="form-row">
        <div class="field">
          <label for="inpPrenom">Prénom</label>
          <input type="text" id="inpPrenom" placeholder="Marie" autocomplete="given-name">
        </div>
        <div class="field">
          <label for="inpNom">Nom</label>
          <input type="text" id="inpNom" placeholder="Dupont" autocomplete="family-name">
        </div>
      </div>
      <div class="field" style="margin-top:12px">
        <label for="inpEmail">Email</label>
        <input type="email" id="inpEmail" placeholder="marie.dupont@ailancy.com" autocomplete="email">
      </div>
    </div>
    <p class="error-msg" id="errMsg"></p>
    <div class="modal-actions">
      <button class="btn-cancel-modal" id="btnCancelModal">Annuler</button>
      <button class="btn-confirm" id="btnConfirm">Confirmer</button>
    </div>

    <!-- CALENDRIER — affiché après inscription -->
    <div class="calendar-section" id="calendarSection" style="display:none">
      <p class="calendar-section-label">📅 Ajouter à mon calendrier</p>
      <div class="calendar-btns">
        <a class="btn-cal btn-cal-outlook" id="calOutlook" href="#" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073C24 5.445 18.627 0 12 0S0 5.445 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047v-2.66c0-3.025 1.791-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.265h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z" style="display:none"/><path d="M2 4h20v16H2V4zm9 2L4 11l1.5 1L11 8.5 17.5 12 19 11 11 6zM4 13v5h14v-5l-7 4-7-4z"/></svg>
          Ajouter à Outlook
        </a>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG SUPABASE — remplace ces deux valeurs
// ============================================================
const SUPABASE_URL = 'https://yojscwkfnuddouoqdnnh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvanNjd2tmbnVkZG91b3Fkbm5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNjgzNDMsImV4cCI6MjA5MzY0NDM0M30.IFdq6Qff5URIQvbImGkMRzokfM93og_p8SaJ-P2j5W4';
// ============================================================

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);


// ============================================================
// DONNÉES DES MEETINGS — modifie les dates/heures/lieux ici
// ============================================================
const MEETINGS = [
  {
    id: 1,
    label: 'Session 01',
    lieu: 'Ailancy',
    adresse: '32 Rue de Ponthieu, 75008 Paris',
    date: 'Mardi 10 juin 2026',
    heure: '13h30'
  },
  {
    id: 2,
    label: 'Session 02',
    lieu: 'Ailancy',
    adresse: '32 Rue de Ponthieu, 75008 Paris',
    date: 'Jeudi 19 juin 2026',
    heure: '13h00'
  },
  {
    id: 3,
    label: 'Session 03',
    lieu: 'Paris — Lieu à définir',
    adresse: 'Paris, France',
    date: 'Mardi 1er juillet 2026',
    heure: '16h30'
  },
  {
    id: 4,
    label: 'Session 04',
    lieu: 'Paris — Lieu à définir',
    adresse: 'Paris, France',
    date: 'Jeudi 10 juillet 2026',
    heure: '17h00'
  }
];
// ============================================================

let allInscrits = [];        // liste complète depuis Supabase
let currentMeetingId = null;
let localUser = JSON.parse(localStorage.getItem('nw_user') || 'null');

// --- INIT ---
async function init() {
  await loadInscrits();
  render();
  document.getElementById('loadingScreen').classList.add('hide');
}

async function loadInscrits() {
  const { data, error } = await db.from('inscriptions').select('*');
  if (!error && data) allInscrits = data;
}

function getMyMeetingId() {
  if (!localUser) return null;
  const found = allInscrits.find(a => a.email === localUser.email);
  return found ? found.meeting_id : null;
}

function getInscritsForMeeting(meetingId) {
  return allInscrits.filter(a => a.meeting_id === meetingId);
}

// --- RENDER ---
function render() {
  const myMeetingId = getMyMeetingId();
  const grid = document.getElementById('grid');
  grid.innerHTML = MEETINGS.map((m, i) => {
    const inscrits = getInscritsForMeeting(m.id);
    const isRegistered = myMeetingId === m.id;

    const attendeeItems = inscrits.length === 0
      ? `<p class="empty-msg">Aucun inscrit pour l'instant</p>`
      : inscrits.map(a => {
          const isMe = localUser && a.email === localUser.email;
          return `<div class="attendee${isMe ? ' me' : ''}">${a.prenom} ${a.nom}${isMe ? ' (vous)' : ''}</div>`;
        }).join('');

    return `
    <div class="card">
      <div>
        <p class="card-tag">${m.label}</p>
        <p class="card-title">${m.lieu}</p>
      </div>
      <div class="card-meta">
        <div class="meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          ${m.date}
        </div>
        <div class="meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
          ${m.heure}
        </div>
        <div class="meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.5-7-11a7 7 0 0 1 14 0c0 4.5-7 11-7 11z"/><circle cx="12" cy="10" r="2"/></svg>
          ${m.adresse}
        </div>
      </div>
      <div class="divider"></div>
      <p class="attendees-label">Inscrits <span class="count-badge">(<span>${inscrits.length}</span>)</span></p>
      <div class="attendees-list">${attendeeItems}</div>
      <button class="btn-register${isRegistered ? ' registered' : ''}" onclick="openModal(${m.id})">
        ${isRegistered ? '✓ Inscrit(e) — modifier' : 'S\'inscrire →'}
      </button>
    </div>`;
  }).join('');
}

// --- MODAL ---
function openModal(meetingId) {
  currentMeetingId = meetingId;
  const m = MEETINGS.find(x => x.id === meetingId);
  const myMeetingId = getMyMeetingId();

  document.getElementById('modalTag').textContent = m.label;
  document.getElementById('modalTitle').textContent = 'S\'inscrire à la session';
  document.getElementById('modalInfoTitle').textContent = `${m.lieu} — ${m.date}`;
  document.getElementById('modalInfoDetails').textContent = `${m.heure} · ${m.adresse}`;
  document.getElementById('errMsg').style.display = 'none';
  document.getElementById('errMsg').textContent = '';

  const switchNotice = document.getElementById('switchNotice');
  const confirmIdentity = document.getElementById('confirmIdentity');
  const formFields = document.getElementById('formFields');
  const btnConfirm = document.getElementById('btnConfirm');

  switchNotice.style.display = 'none';
  hideCalendarButtons();

  if (localUser) {
    formFields.style.display = 'none';
    confirmIdentity.style.display = 'block';
    document.getElementById('confirmName').textContent = `${localUser.prenom} ${localUser.nom}`;

    if (myMeetingId === meetingId) {
      switchNotice.textContent = 'Vous êtes déjà inscrit(e) à cette session. Cliquez pour vous désinscrire.';
      switchNotice.style.display = 'block';
      btnConfirm.textContent = 'Se désinscrire';
    } else if (myMeetingId && myMeetingId !== meetingId) {
      const prev = MEETINGS.find(x => x.id === myMeetingId);
      switchNotice.textContent = `⚠ Vous étiez inscrit(e) à la ${prev.label} (${prev.date}). Vous serez automatiquement désinscrit(e).`;
      switchNotice.style.display = 'block';
      btnConfirm.textContent = 'Confirmer le changement';
    } else {
      btnConfirm.textContent = 'Confirmer l\'inscription';
    }
  } else {
    formFields.style.display = 'block';
    confirmIdentity.style.display = 'none';
    document.getElementById('inpPrenom').value = '';
    document.getElementById('inpNom').value = '';
    document.getElementById('inpEmail').value = '';
    btnConfirm.textContent = 'Confirmer l\'inscription';
  }

  document.getElementById('overlay').classList.add('active');
  if (!localUser) setTimeout(() => document.getElementById('inpPrenom').focus(), 50);
}

document.getElementById('btnClose').onclick = closeModal;
document.getElementById('btnCancelModal').onclick = closeModal;
document.getElementById('overlay').onclick = function(e) {
  if (e.target === this) closeModal();
};

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// --- CONFIRM ---
document.getElementById('btnConfirm').onclick = async function() {
  const btn = this;
  btn.disabled = true;
  btn.textContent = 'En cours…';

  const errEl = document.getElementById('errMsg');
  const myMeetingId = getMyMeetingId();

  try {
    if (!localUser) {
      // Nouveau visiteur
      const prenom = document.getElementById('inpPrenom').value.trim();
      const nom = document.getElementById('inpNom').value.trim();
      const email = document.getElementById('inpEmail').value.trim().toLowerCase();

      if (!prenom || !nom || !email) { showError('Merci de remplir tous les champs.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Adresse email invalide.'); return; }

      const alreadyInMeeting = allInscrits.find(a => a.email === email && a.meeting_id === currentMeetingId);
      if (alreadyInMeeting) { showError('Cet email est déjà inscrit à cette session.'); return; }

      const { error } = await db.from('inscriptions').insert({ prenom, nom, email, meeting_id: currentMeetingId });
      if (error) {
        showError(error.code === '23505' ? 'Cet email est déjà inscrit à une autre session. Rafraîchissez la page.' : 'Erreur lors de l\'inscription. Réessayez.');
        return;
      }

      localUser = { prenom, nom, email };
      localStorage.setItem('nw_user', JSON.stringify(localUser));
      showToast(`✓ ${prenom}, vous êtes inscrit(e) !`);
      await loadInscrits();
      render();
      openModalCalendrier(currentMeetingId);
      return;

    } else if (myMeetingId === currentMeetingId) {
      // Désinscription
      const { error } = await db.from('inscriptions').delete().eq('email', localUser.email);
      if (error) { showError('Erreur lors de la désinscription.'); return; }
      showToast('Vous avez été désinscrit(e).');

    } else {
      // Changement ou nouvelle inscription (user connu)
      if (myMeetingId) await db.from('inscriptions').delete().eq('email', localUser.email);
      const { error } = await db.from('inscriptions').insert({
        prenom: localUser.prenom,
        nom: localUser.nom,
        email: localUser.email,
        meeting_id: currentMeetingId
      });
      if (error) { showError('Erreur lors de l\'inscription.'); return; }
      showToast(`✓ Inscription confirmée !`);
      await loadInscrits();
      render();
      openModalCalendrier(currentMeetingId);
      return;
    }

    await loadInscrits();
    closeModal();
    render();

  } finally {
    btn.disabled = false;
    btn.textContent = 'Confirmer';
  }
};

// --- CALENDRIER ---
// Convertit "Mardi 10 juin 2026" + "13h30" en format ICS : 20260610T133000
function parseDateToICS(dateStr, heureStr) {
  const months = {
    'janvier':1,'février':2,'mars':3,'avril':4,'mai':5,'juin':6,
    'juillet':7,'août':8,'septembre':9,'octobre':10,'novembre':11,'décembre':12
  };
  // Retire les ordinaux et préfixes (Mardi, 1er, etc.)
  const clean = dateStr.toLowerCase().replace(/1er/g,'1').replace(/^[a-zé]+\s+/,'');
  const parts = clean.trim().split(/\s+/); // ['10', 'juin', '2026']
  const day = String(parseInt(parts[0])).padStart(2,'0');
  const month = String(months[parts[1]] || 1).padStart(2,'0');
  const year = parts[2] || '2026';
  const [h, m] = heureStr.replace('h',':').split(':');
  const hh = String(parseInt(h)).padStart(2,'0');
  const mm = String(parseInt(m||0)).padStart(2,'0');
  return { date: `${year}${month}${day}`, time: `${hh}${mm}00` };
}

function buildOutlookUrl(meeting) {
  const { date, time } = parseDateToICS(meeting.date, meeting.heure);

  const endHour = String(parseInt(time.substring(0,2)) + 2).padStart(2,'0');
  const endTime = `${endHour}${time.substring(2)}`;

  const start = `${date}T${time}`;
  const end   = `${date}T${endTime}`;

  const title = encodeURIComponent(`Session Networking Advisory — ${meeting.label}`);

  const location = encodeURIComponent(meeting.adresse);

  const body = encodeURIComponent(
    `Session de networking Advisory\n\nLieu : ${meeting.lieu}`
  );

  return `https://outlook.office.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent&subject=${title}&startdt=${start}&enddt=${end}&location=${location}&body=${body}`;
}


function buildGoogleUrl(meeting) {
  const { date, time } = parseDateToICS(meeting.date, meeting.heure);
  const endHour = String(parseInt(time.substring(0,2)) + 2).padStart(2,'0');
  const endTime = `${endHour}${time.substring(2)}`;
  const start = `${date}T${time}`;
  const end   = `${date}T${endTime}`;
  const title = encodeURIComponent(`Session Networking Advisory — ${meeting.label}`);
  const loc   = encodeURIComponent(meeting.adresse);
  const details = encodeURIComponent(`Session de networking Advisory\nLieu : ${meeting.lieu}`);
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&location=${loc}&details=${details}`;
}

// Ouvre la modale en mode "confirmation + calendrier" après inscription réussie
function openModalCalendrier(meetingId) {
  const m = MEETINGS.find(x => x.id === meetingId);
  document.getElementById('modalTag').textContent = m.label;
  document.getElementById('modalTitle').textContent = '✓ Inscription confirmée !';
  document.getElementById('modalInfoTitle').textContent = `${m.lieu} — ${m.date}`;
  document.getElementById('modalInfoDetails').textContent = `${m.heure} · ${m.adresse}`;
  document.getElementById('formFields').style.display = 'none';
  document.getElementById('confirmIdentity').style.display = 'none';
  document.getElementById('switchNotice').style.display = 'none';
  document.getElementById('errMsg').style.display = 'none';
  document.getElementById('btnConfirm').style.display = 'none';
  document.getElementById('btnCancelModal').textContent = 'Fermer';
  showCalendarButtons(meetingId);
  document.getElementById('overlay').classList.add('active');
}

// Remet le bouton Confirmer visible quand on ferme
function closeModal() {
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('btnConfirm').style.display = '';
  document.getElementById('btnCancelModal').textContent = 'Annuler';
  currentMeetingId = null;
}

function showCalendarButtons(meetingId) {
  const m = MEETINGS.find(x => x.id === meetingId);
  if (!m) return;

  document.getElementById('calOutlook').href = buildOutlookUrl(m);

  document.getElementById('calendarSection').style.display = 'block';
}


function hideCalendarButtons() {
  document.getElementById('calendarSection').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('btnConfirm').disabled = false;
  document.getElementById('btnConfirm').textContent = 'Confirmer l\'inscription';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
